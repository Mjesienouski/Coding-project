<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Runner Timing Tracker & Speedometer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #eee; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1rem; overflow-x: hidden; }
    h1 { font-size: 14px; font-weight: 600; color: #888; margin-bottom: 1rem; letter-spacing: 1.5px; text-transform: uppercase; }
    
    .canvas-wrap { position: relative; border-radius: 16px; overflow: hidden; border: 1px solid #333; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 640px; cursor: crosshair; }
    #videoEl { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; }
    #poseCanvas { display: block; width: 100%; height: auto; }
    
    .controls { display: flex; align-items: center; gap: 8px; margin-top: 1rem; flex-wrap: wrap; justify-content: center; max-width: 700px; }
    button { padding: 9px 14px; border: none; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; border: 1px solid transparent; }
    .btn-green { background: #1D9E75; color: #fff; }
    .btn-gray { background: #222; color: #ccc; border-color: #444; }
    .btn-blue { background: #4D96FF; color: white; }
    .btn-red { background: #c0392b; color: #fff; }
    .btn-active { border-color: #1D9E75; box-shadow: 0 0 10px rgba(29, 158, 117, 0.3); }
    button:disabled { opacity: 0.2; cursor: default; }

    .setting-group { display: flex; background: #1a1a1a; padding: 4px; border-radius: 12px; border: 1px solid #333; gap: 4px; }
    .setting-btn { padding: 6px 10px; border-radius: 8px; font-size: 10px; background: transparent; color: #666; }
    .setting-btn.active { background: #333; color: #fff; }

    .status { font-size: 12px; color: #666; margin-top: 10px; text-align: center; min-height: 1.4em; }
    .status span { color: #1D9E75; font-weight: 600; }
    
    .timing-panel { margin-top: 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 20px; width: 100%; max-width: 600px; }
    .timing-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #1e1e1e; }
    .timing-row:last-child { border-bottom: none; }
    .t-label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .t-value { font-weight: 700; font-size: 18px; font-variant-numeric: tabular-nums; }
    .t-green { color: #1D9E75; }
    .t-blue { color: #4D96FF; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #1a1a1a; padding: 24px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 300px; text-align: center; }
    .modal input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; text-align: center; font-size: 18px; }

    .hint { font-size: 11px; color: #555; margin-top: 8px; text-align: center; max-width: 400px; }
  </style>
</head>
<body>

<h1>Runner Tracker & Speedometer</h1>

<div class="canvas-wrap" id="canvasWrap">
  <video id="videoEl" autoplay muted playsinline></video>
  <canvas id="poseCanvas"></canvas>
</div>

<div class="controls">
  <button class="btn-green" id="btnStart">Start Camera</button>
  
  <div class="setting-group">
    <button class="setting-btn active" id="modeVert">Vertical</button>
    <button class="setting-btn" id="modeHoriz">Horizontal</button>
  </div>

  <button class="btn-gray" id="btnSwitch" disabled>Flip</button>
  <button class="btn-blue" id="btnSetMarkers" disabled>Set Markers</button>
  <button class="btn-red" id="btnReset" disabled>Reset</button>
</div>

<div class="status" id="statusLine">Permission required for camera</div>
<div class="hint" id="hintLine">Toggle between Vertical (side-to-side race) or Horizontal (top-to-bottom race).</div>

<div class="timing-panel">
  <div class="timing-row">
    <span class="t-label">Status</span>
    <span class="t-value" id="tStatus" style="color:#FFD93D">Waiting</span>
  </div>
  <div class="timing-row">
    <span class="t-label">Time</span>
    <span class="t-value t-blue" id="tSplit">--.---s</span>
  </div>
  <div class="timing-row">
    <span class="t-label">Distance</span>
    <span class="t-value" id="tDist">-- m</span>
  </div>
  <div class="timing-row">
    <span class="t-label">Avg Speed</span>
    <span class="t-value t-green" id="tSpeed">--.-- m/s</span>
  </div>
</div>

<!-- Modal for Distance Input -->
<div class="modal" id="distModal">
  <div class="modal-content">
    <h3 style="font-size: 14px; text-transform: uppercase; color: #888;">Set Track Distance</h3>
    <input type="number" id="distInput" value="10" placeholder="Distance in meters" step="0.5">
    <div style="font-size: 11px; color: #555; margin-bottom: 15px;">Enter meters between the two lines.</div>
    <button class="btn-green" style="width: 100%;" id="btnSaveDist">Confirm Distance</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
let detector=null,rafId=null,confVal=0.3;
let currentFacingMode='environment',stream=null;
let settingMarkers=false,markerClickCount=0;
let markerOrientation='vertical'; // 'vertical' (lines are vertical, track X), 'horizontal' (lines are horizontal, track Y)
let lineStartPos=null,lineFinishPos=null,trackDistance=10;

let startTime=null,finishTime=null,isFinished=false,isRunning=false;
let prevBodyCoord=null;

const videoEl=document.getElementById('videoEl');
const canvas=document.getElementById('poseCanvas');
const ctx=canvas.getContext('2d');

function setStatus(msg){document.getElementById('statusLine').innerHTML=msg;}
function setHint(msg){document.getElementById('hintLine').textContent=msg;}

function updateUI(){
  const statusEl = document.getElementById('tStatus');
  if(isFinished) {
    statusEl.textContent = "FINISHED";
    statusEl.style.color = "#4D96FF";
  } else if(isRunning) {
    statusEl.textContent = "RACING";
    statusEl.style.color = "#1D9E75";
  } else {
    statusEl.textContent = lineStartPos !== null ? "READY" : "SET MARKERS";
    statusEl.style.color = "#FFD93D";
  }
  
  const elapsed = (isRunning && startTime) ? (performance.now() - startTime) : (isFinished ? (finishTime - startTime) : 0);
  document.getElementById('tSplit').textContent = elapsed > 0 ? (elapsed/1000).toFixed(3) + 's' : '--.---s';
  document.getElementById('tDist').textContent = trackDistance + ' m';
  
  if(isFinished && elapsed > 0) {
    const speed = trackDistance / (elapsed / 1000);
    document.getElementById('tSpeed').textContent = speed.toFixed(2) + ' m/s';
  } else {
    document.getElementById('tSpeed').textContent = '--.-- m/s';
  }
}

async function initCamera(){
  setStatus('Connecting...');
  try {
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:currentFacingMode,width:640,height:480},audio:false
    });
    videoEl.srcObject=stream;
    await videoEl.play();
    canvas.width=videoEl.videoWidth;
    canvas.height=videoEl.videoHeight;
    
    if(!detector){
      setStatus('Loading AI...');
      detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
    }
    
    setStatus('<span>Tracker Active</span>');
    document.getElementById('btnStart').style.display='none';
    ['btnSwitch','btnSetMarkers','btnReset'].forEach(id=>document.getElementById(id).disabled=false);
    loop();
  } catch(e) {
    setStatus('Error: '+e.message);
  }
}

function getBodyCoord(poses){
  if(!poses || poses.length === 0) return null;
  const kp = poses[0].keypoints;
  const relevant = kp.filter(k => k.score > confVal && ['left_hip','right_hip','left_shoulder','right_shoulder'].includes(k.name));
  if(relevant.length === 0) return null;
  
  const sumX = relevant.reduce((s,k)=>s+k.x, 0);
  const sumY = relevant.reduce((s,k)=>s+k.y, 0);
  return { x: sumX/relevant.length, y: sumY/relevant.length };
}

function loop(){
  ctx.drawImage(videoEl,0,0);
  
  // Draw Markers
  if(lineStartPos !== null) drawMarker(lineStartPos, '#00FF88', 'START');
  if(lineFinishPos !== null) drawMarker(lineFinishPos, '#FF4444', 'FINISH');

  detector.estimatePoses(videoEl).then(poses => {
    const coord = getBodyCoord(poses);
    if(coord){
      // Visual feedback for tracking
      ctx.beginPath();ctx.arc(coord.x, coord.y, 8, 0, Math.PI*2);
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();

      const currentVal = markerOrientation === 'vertical' ? coord.x : coord.y;
      
      if(lineStartPos !== null && lineFinishPos !== null && !isFinished){
        if(prevBodyCoord !== null){
          // Check Start
          if(!isRunning){
            if((prevBodyCoord < lineStartPos && currentVal >= lineStartPos) || (prevBodyCoord > lineStartPos && currentVal <= lineStartPos)){
              startTime = performance.now();
              isRunning = true;
              setHint("GO! GO! GO!");
            }
          } 
          // Check Finish
          else {
            if((prevBodyCoord < lineFinishPos && currentVal >= lineFinishPos) || (prevBodyCoord > lineFinishPos && currentVal <= lineFinishPos)){
              finishTime = performance.now();
              isRunning = false;
              isFinished = true;
              setHint("Race Finished!");
            }
          }
        }
        prevBodyCoord = currentVal;
      }
    }
    
    if(isRunning || isFinished) updateUI();
    rafId = requestAnimationFrame(loop);
  });
}

function drawMarker(pos, color, label){
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.setLineDash([10,5]);
  ctx.beginPath();
  if(markerOrientation === 'vertical'){
    ctx.moveTo(pos, 0); ctx.lineTo(pos, canvas.height);
  } else {
    ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos);
  }
  ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = "bold 14px sans-serif";
  if(markerOrientation === 'vertical') ctx.fillText(label, pos+10, 30);
  else ctx.fillText(label, 10, pos-10);
  ctx.restore();
}

// Event Listeners
document.getElementById('btnStart').onclick = initCamera;

document.getElementById('btnReset').onclick = () => {
  startTime=null;finishTime=null;isRunning=false;isFinished=false;
  prevBodyCoord=null;
  updateUI();
  setHint("Reset complete. Ready for next run.");
};

document.getElementById('btnSetMarkers').onclick = () => {
  settingMarkers = true;
  markerClickCount = 0;
  lineStartPos = null; lineFinishPos = null;
  document.getElementById('btnSetMarkers').classList.add('btn-active');
  setHint(`Click the canvas to place START line (${markerOrientation})`);
};

canvas.onclick = (e) => {
  if(!settingMarkers) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  
  const val = markerOrientation === 'vertical' ? x : y;

  if(markerClickCount === 0){
    lineStartPos = val;
    markerClickCount = 1;
    setHint("Great. Now click for the FINISH line.");
  } else {
    lineFinishPos = val;
    settingMarkers = false;
    markerClickCount = 2;
    document.getElementById('btnSetMarkers').classList.remove('btn-active');
    document.getElementById('distModal').style.display = 'flex';
  }
};

document.getElementById('btnSaveDist').onclick = () => {
  trackDistance = parseFloat(document.getElementById('distInput').value) || 10;
  document.getElementById('distModal').style.display = 'none';
  setHint(`Ready! Run through the Start line to begin ${trackDistance}m sprint.`);
  updateUI();
};

document.getElementById('modeVert').onclick = function() {
  markerOrientation = 'vertical';
  this.classList.add('active');
  document.getElementById('modeHoriz').classList.remove('active');
  lineStartPos = null; lineFinishPos = null; // Clear existing as they don't map
  updateUI();
};

document.getElementById('modeHoriz').onclick = function() {
  markerOrientation = 'horizontal';
  this.classList.add('active');
  document.getElementById('modeVert').classList.remove('active');
  lineStartPos = null; lineFinishPos = null;
  updateUI();
};

document.getElementById('btnSwitch').onclick = async () => {
  currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
  if(stream) stream.getTracks().forEach(t=>t.stop());
  initCamera();
};
</script>
</body>
</html>
