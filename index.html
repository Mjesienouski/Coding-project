<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Live Pose Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #eee; font-family: -apple-system, system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; overflow: hidden; }
    h1 { font-size: 16px; font-weight: 600; color: #888; margin-bottom: 1rem; letter-spacing: 1.5px; text-transform: uppercase; }
    
    .canvas-wrap { 
      position: relative; 
      border-radius: 16px; 
      overflow: hidden; 
      border: 1px solid #333; 
      background: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 100%;
      max-height: 70vh;
    }
    #videoEl { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; }
    #poseCanvas { display: block; max-width: 100%; height: auto; }
    
    .controls { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      margin-top: 1.25rem; 
      flex-wrap: wrap; 
      justify-content: center; 
      max-width: 600px;
    }
    
    button { 
      padding: 10px 18px; 
      border: none; 
      border-radius: 10px; 
      font-size: 13px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-green { background: #1D9E75; color: #fff; }
    .btn-green:active { transform: scale(0.95); }
    .btn-gray  { background: #222; color: #ccc; border: 1px solid #444; }
    .btn-gray:active { background: #333; }
    
    button:disabled { opacity: 0.2; cursor: default; transform: none !important; }
    
    .slider-wrap { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      font-size: 12px; 
      color: #888; 
      background: #1a1a1a;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #333;
    }
    input[type=range] { width: 80px; accent-color: #1D9E75; cursor: pointer; }
    
    .status { font-size: 12px; color: #666; margin-top: 12px; text-align: center; height: 1.2em; }
    .status span { color: #1D9E75; font-weight: 600; }
    
    .legend { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 12px; padding: 0 10px; }
    .leg-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #555; text-transform: uppercase; font-weight: 700; }
    .leg-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* Icon placeholders */
    .icon { width: 14px; height: 14px; fill: currentColor; }
  </style>
</head>
<body>

<h1>Live Pose Tracker</h1>

<div class="canvas-wrap" id="canvasWrap">
  <video id="videoEl" autoplay muted playsinline></video>
  <canvas id="poseCanvas"></canvas>
</div>

<div class="controls">
  <button class="btn-green" id="btnStart">Start Tracking</button>
  <button class="btn-gray" id="btnSwitch" disabled>Flip Camera</button>
  <button class="btn-gray" id="btnToggle" disabled>Skeleton</button>
  <button class="btn-gray" id="btnMirror" disabled>Mirror</button>
  
  <div class="slider-wrap">
    Confidence
    <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.3" />
    <span id="confOut" style="width: 20px;">0.3</span>
  </div>
</div>

<div class="status" id="statusLine">Permission required for camera</div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#FF6B6B;"></div>Head</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FFD93D;"></div>Torso</div>
  <div class="leg-item"><div class="leg-dot" style="background:#6BCB77;"></div>Arms</div>
  <div class="leg-item"><div class="leg-dot" style="background:#4D96FF;"></div>Hips</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FF922B;"></div>Legs</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
  let detector   = null;
  let rafId      = null;
  let confVal    = 0.3;
  let showSkel   = true;
  let mirrored   = true; // Default to mirrored for selfie
  let currentFacingMode = 'user';
  let stream = null;

  const COLORS = {
    nose:'#FF6B6B', left_eye:'#FF6B6B', right_eye:'#FF6B6B',
    left_ear:'#FF6B6B', right_ear:'#FF6B6B',
    left_shoulder:'#FFD93D', right_shoulder:'#FFD93D',
    left_elbow:'#6BCB77',   right_elbow:'#6BCB77',
    left_wrist:'#6BCB77',   right_wrist:'#6BCB77',
    left_hip:'#4D96FF',     right_hip:'#4D96FF',
    left_knee:'#FF922B',    right_knee:'#FF922B',
    left_ankle:'#CC5DE8',   right_ankle:'#CC5DE8'
  };

  const PAIRS = [
    ['nose','left_eye'],['nose','right_eye'],
    ['left_eye','left_ear'],['right_eye','right_ear'],
    ['left_shoulder','right_shoulder'],
    ['left_shoulder','left_elbow'],['right_shoulder','right_elbow'],
    ['left_elbow','left_wrist'],['right_elbow','right_wrist'],
    ['left_shoulder','left_hip'],['right_shoulder','right_hip'],
    ['left_hip','right_hip'],
    ['left_hip','left_knee'],['right_hip','right_knee'],
    ['left_knee','left_ankle'],['right_knee','right_ankle']
  ];

  function setStatus(msg) {
    document.getElementById('statusLine').innerHTML = msg;
  }

  function toggleSkeleton() {
    showSkel = !showSkel;
    document.getElementById('btnToggle').style.borderColor = showSkel ? '#1D9E75' : '#444';
  }

  function toggleMirror() {
    mirrored = !mirrored;
    document.getElementById('btnMirror').style.borderColor = mirrored ? '#1D9E75' : '#444';
  }

  async function switchCamera() {
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    // Auto-adjust mirroring based on camera
    mirrored = (currentFacingMode === 'user');
    document.getElementById('btnMirror').style.borderColor = mirrored ? '#1D9E75' : '#444';
    
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
    await initCamera();
  }

  async function initCamera() {
    const btnStart = document.getElementById('btnStart');
    const btnSwitch = document.getElementById('btnSwitch');
    btnStart.disabled = true;
    btnSwitch.disabled = true;
    
    setStatus(`Connecting to ${currentFacingMode === 'user' ? 'Front' : 'Back'} Camera...`);

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { 
          facingMode: currentFacingMode,
          width: { ideal: 640 }, 
          height: { ideal: 480 } 
        },
        audio: false
      });
    } catch(e) {
      setStatus('Camera error: ' + e.message);
      btnStart.disabled = false;
      return;
    }

    const video  = document.getElementById('videoEl');
    const canvas = document.getElementById('poseCanvas');
    const wrap   = document.getElementById('canvasWrap');

    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();

    // Set canvas dimensions based on ACTUAL video feed
    const W = video.videoWidth;
    const H = video.videoHeight;
    canvas.width  = W;
    canvas.height = H;

    // Responsive sizing
    const maxW = Math.min(window.innerWidth - 40, 640);
    const scale = maxW / W;
    wrap.style.width  = Math.round(W * scale) + 'px';
    wrap.style.height = Math.round(H * scale) + 'px';

    if (!detector) {
      setStatus('Loading AI Brain...');
      await tf.ready();
      detector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
      );
    }

    setStatus('<span>Tracker Active</span>');
    document.getElementById('btnToggle').disabled = false;
    document.getElementById('btnMirror').disabled = false;
    document.getElementById('btnSwitch').disabled = false;
    
    document.getElementById('btnToggle').style.borderColor = showSkel ? '#1D9E75' : '#444';
    document.getElementById('btnMirror').style.borderColor = mirrored ? '#1D9E75' : '#444';

    loop(video, canvas);
  }

  async function loop(video, canvas) {
    const ctx = canvas.getContext('2d');
    const W   = canvas.width;
    const H   = canvas.height;

    // Draw background video
    ctx.save();
    if (mirrored) {
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, 0, 0, W, H);
    ctx.restore();

    let poses = [];
    try { 
      poses = await detector.estimatePoses(video); 
    } catch(e) {
      // Recovery logic if prediction fails temporarily
    }

    if (poses.length > 0) {
      const pose  = poses[0];
      const kpMap = {};
      let detected = 0;

      pose.keypoints.forEach(kp => {
        kpMap[kp.name] = kp;
        if (kp.score >= confVal) detected++;
      });

      if (showSkel) {
        PAIRS.forEach(([a, b]) => {
          const ka = kpMap[a], kb = kpMap[b];
          if (!ka || !kb || ka.score < confVal || kb.score < confVal) return;

          let ax = ka.x, bx = kb.x;
          if (mirrored) { ax = W - ax; bx = W - bx; }

          ctx.beginPath();
          ctx.moveTo(ax, ka.y);
          ctx.lineTo(bx, kb.y);
          ctx.strokeStyle = COLORS[a];
          ctx.globalAlpha = 0.6;
          ctx.lineWidth   = 4;
          ctx.lineCap     = 'round';
          ctx.stroke();
          ctx.globalAlpha = 1.0;
        });
      }

      pose.keypoints.forEach(kp => {
        if (kp.score < confVal) return;
        const color = COLORS[kp.name] || '#fff';
        let x = kp.x;
        if (mirrored) x = W - x;

        // Glow
        ctx.beginPath();
        ctx.arc(x, kp.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = color;
        ctx.fill();
        ctx.shadowBlur = 0;

        // Core
        ctx.beginPath();
        ctx.arc(x, kp.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      });
    }

    rafId = requestAnimationFrame(() => loop(video, canvas));
  }

  // Event Listeners
  window.addEventListener('load', () => {
    document.getElementById('btnStart').onclick = initCamera;
    document.getElementById('btnToggle').onclick = toggleSkeleton;
    document.getElementById('btnMirror').onclick = toggleMirror;
    document.getElementById('btnSwitch').onclick = switchCamera;
    
    const slider = document.getElementById('confSlider');
    slider.oninput = function() {
      confVal = parseFloat(this.value);
      document.getElementById('confOut').textContent = this.value;
    };
    
    // Cleanup on window close
    window.addEventListener('unload', () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
    });
  });
</script>
</body>
</html>
