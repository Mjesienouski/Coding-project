<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(#70c5ce, #ffffff);
        font-family: Arial, sans-serif;
    }

    canvas {
        border: 2px solid #000;
        background: #70c5ce;
    }

    .hint {
        position: absolute;
        top: 10px;
        font-size: 14px;
        color: #000;
    }
</style>
</head>
<body>

<div class="hint">Click or Press Space to Jump</div>
<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Game constants
const gravity = 0.5;
const jump = -8;
const pipeWidth = 60;
const gap = 150;

// Bird
let bird = {
    x: 80,
    y: 300,
    radius: 12,
    velocity: 0
};

// Pipes
let pipes = [];
let frame = 0;
let score = 0;
let gameOver = false;

// Controls
document.addEventListener("keydown", e => {
    if (e.code === "Space") flap();
});
canvas.addEventListener("click", flap);

function flap() {
    if (gameOver) {
        resetGame();
    } else {
        bird.velocity = jump;
    }
}

// Reset
function resetGame() {
    bird.y = 300;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    frame = 0;
    gameOver = false;
}

// Create pipe
function createPipe() {
    const topHeight = Math.random() * 250 + 50;
    pipes.push({
        x: canvas.width,
        top: topHeight,
        bottom: topHeight + gap,
        passed: false
    });
}

// Update
function update() {
    if (gameOver) return;

    frame++;
    bird.velocity += gravity;
    bird.y += bird.velocity;

    // Ground / ceiling
    if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
        gameOver = true;
    }

    // Pipes
    if (frame % 90 === 0) createPipe();

    pipes.forEach(pipe => {
        pipe.x -= 2;

        // Collision
        if (
            bird.x + bird.radius > pipe.x &&
            bird.x - bird.radius < pipe.x + pipeWidth &&
            (bird.y - bird.radius < pipe.top ||
             bird.y + bird.radius > pipe.bottom)
        ) {
            gameOver = true;
        }

        // Score
        if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
            score++;
            pipe.passed = true;
        }
    });

    pipes = pipes.filter(p => p.x + pipeWidth > 0);
}

// Draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Bird
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
    ctx.fill();

    // Pipes
    ctx.fillStyle = "green";
    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, canvas.height);
    });

    // Score
    ctx.fillStyle = "#000";
    ctx.font = "32px Arial";
    ctx.fillText(score, canvas.width / 2 - 10, 50);

    // Game over
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "28px Arial";
        ctx.fillText("Game Over", 120, 260);
        ctx.font = "18px Arial";
        ctx.fillText("Click or Space to Restart", 95, 300);
    }
}

// Loop
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
