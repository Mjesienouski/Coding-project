<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Pose Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #eee; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
    h1 { font-size: 18px; font-weight: 500; color: #aaa; margin-bottom: 1rem; letter-spacing: 1px; text-transform: uppercase; }
    .canvas-wrap { position: relative; border-radius: 14px; overflow: hidden; border: 1px solid #222; }
    #videoEl { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; }
    #poseCanvas { display: block; }
    .controls { display: flex; align-items: center; gap: 16px; margin-top: 1rem; flex-wrap: wrap; justify-content: center; }
    button { padding: 9px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-green { background: #1D9E75; color: #fff; }
    .btn-gray  { background: #222; color: #aaa; border: 1px solid #333; }
    button:disabled { opacity: 0.35; cursor: default; }
    .slider-wrap { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
    input[type=range] { width: 100px; accent-color: #1D9E75; }
    .status { font-size: 12px; color: #555; margin-top: 8px; letter-spacing: 0.5px; }
    .status span { color: #1D9E75; }
    .legend { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
    .leg-dot { width: 9px; height: 9px; border-radius: 50%; }
  </style>
</head>
<body>

<h1>Live Pose Tracker</h1>

<div class="canvas-wrap" id="canvasWrap">
  <video id="videoEl" autoplay muted playsinline></video>
  <canvas id="poseCanvas"></canvas>
</div>

<div class="controls">
  <button class="btn-green" id="btnStart">Start camera</button>
  <button class="btn-gray"  id="btnToggle" disabled>Hide skeleton</button>
  <button class="btn-gray"  id="btnMirror" disabled>Mirror</button>
  <div class="slider-wrap">
    Confidence
    <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.3" />
    <span id="confOut">0.3</span>
  </div>
</div>

<div class="status" id="statusLine">Waiting to start...</div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#FF6B6B;"></div>Head</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FFD93D;"></div>Shoulders</div>
  <div class="leg-item"><div class="leg-dot" style="background:#6BCB77;"></div>Arms</div>
  <div class="leg-item"><div class="leg-dot" style="background:#4D96FF;"></div>Hips</div>
  <div class="leg-item"><div class="leg-dot" style="background:#FF922B;"></div>Knees</div>
  <div class="leg-item"><div class="leg-dot" style="background:#CC5DE8;"></div>Ankles</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
  // Move all functions and variables into global scope correctly
  let detector   = null;
  let rafId      = null;
  let confVal    = 0.3;
  let showSkel   = true;
  let mirrored   = false;

  const COLORS = {
    nose:'#FF6B6B', left_eye:'#FF6B6B', right_eye:'#FF6B6B',
    left_ear:'#FF6B6B', right_ear:'#FF6B6B',
    left_shoulder:'#FFD93D', right_shoulder:'#FFD93D',
    left_elbow:'#6BCB77',   right_elbow:'#6BCB77',
    left_wrist:'#6BCB77',   right_wrist:'#6BCB77',
    left_hip:'#4D96FF',     right_hip:'#4D96FF',
    left_knee:'#FF922B',    right_knee:'#FF922B',
    left_ankle:'#CC5DE8',   right_ankle:'#CC5DE8'
  };

  const PAIRS = [
    ['nose','left_eye'],['nose','right_eye'],
    ['left_eye','left_ear'],['right_eye','right_ear'],
    ['left_shoulder','right_shoulder'],
    ['left_shoulder','left_elbow'],['right_shoulder','right_elbow'],
    ['left_elbow','left_wrist'],['right_elbow','right_wrist'],
    ['left_shoulder','left_hip'],['right_shoulder','right_hip'],
    ['left_hip','right_hip'],
    ['left_hip','left_knee'],['right_hip','right_knee'],
    ['left_knee','left_ankle'],['right_knee','right_ankle']
  ];

  const LABEL_NAMES = {
    nose:'nose', left_eye:'l.eye', right_eye:'r.eye',
    left_ear:'l.ear', right_ear:'r.ear',
    left_shoulder:'l.shoulder', right_shoulder:'r.shoulder',
    left_elbow:'l.elbow', right_elbow:'r.elbow',
    left_wrist:'l.wrist', right_wrist:'r.wrist',
    left_hip:'l.hip', right_hip:'r.hip',
    left_knee:'l.knee', right_knee:'r.knee',
    left_ankle:'l.ankle', right_ankle:'r.ankle'
  };

  function setStatus(msg) {
    document.getElementById('statusLine').innerHTML = msg;
  }

  function toggleSkeleton() {
    showSkel = !showSkel;
    document.getElementById('btnToggle').textContent = showSkel ? 'Hide skeleton' : 'Show skeleton';
  }

  function toggleMirror() {
    mirrored = !mirrored;
    document.getElementById('btnMirror').textContent = mirrored ? 'Unmirror' : 'Mirror';
  }

  async function init() {
    const btnStart = document.getElementById('btnStart');
    btnStart.disabled = true;
    setStatus('Accessing camera...');

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
        audio: false
      });
    } catch(e) {
      setStatus('Camera error: ' + e.message);
      btnStart.disabled = false;
      return;
    }

    const video  = document.getElementById('videoEl');
    const canvas = document.getElementById('poseCanvas');
    const wrap   = document.getElementById('canvasWrap');

    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    await video.play();

    const W = video.videoWidth;
    const H = video.videoHeight;
    canvas.width  = W;
    canvas.height = H;

    const maxW = Math.min(window.innerWidth - 32, 900);
    const scale = maxW / W;
    wrap.style.width  = Math.round(W * scale) + 'px';
    wrap.style.height = Math.round(H * scale) + 'px';

    setStatus('Loading MoveNet model...');
    await tf.ready();
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER }
    );

    setStatus('<span>Model ready — tracking live</span>');
    document.getElementById('btnToggle').disabled = false;
    document.getElementById('btnMirror').disabled = false;

    loop(video, canvas);
  }

  async function loop(video, canvas) {
    const ctx = canvas.getContext('2d');
    const W   = canvas.width;
    const H   = canvas.height;

    ctx.save();
    if (mirrored) {
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, 0, 0, W, H);
    ctx.restore();

    let poses = [];
    try { 
      poses = await detector.estimatePoses(video); 
    } catch(e) {
      // Quietly handle errors in prediction loop
    }

    if (poses.length > 0) {
      const pose  = poses[0];
      const kpMap = {};
      let detected = 0;

      pose.keypoints.forEach(kp => {
        kpMap[kp.name] = kp;
        if (kp.score >= confVal) detected++;
      });

      if (showSkel) {
        PAIRS.forEach(([a, b]) => {
          const ka = kpMap[a], kb = kpMap[b];
          if (!ka || !kb || ka.score < confVal || kb.score < confVal) return;

          let ax = ka.x, bx = kb.x;
          if (mirrored) { ax = W - ax; bx = W - bx; }

          const grad = ctx.createLinearGradient(ax, ka.y, bx, kb.y);
          grad.addColorStop(0, COLORS[a] + 'cc');
          grad.addColorStop(1, COLORS[b] + 'cc');

          ctx.beginPath();
          ctx.moveTo(ax, ka.y);
          ctx.lineTo(bx, kb.y);
          ctx.strokeStyle = grad;
          ctx.lineWidth   = 3.5;
          ctx.stroke();
        });
      }

      pose.keypoints.forEach(kp => {
        if (kp.score < confVal) return;
        const color = COLORS[kp.name] || '#fff';
        let x = kp.x;
        if (mirrored) x = W - x;

        const pulse = 6 + Math.sin(Date.now() / 200 + kp.x) * 1.5;

        ctx.beginPath();
        ctx.arc(x, kp.y, pulse + 4, 0, Math.PI * 2);
        ctx.fillStyle = color + '33';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(x, kp.y, pulse, 0, Math.PI * 2);
        ctx.fillStyle   = color;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth   = 1.5;
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font      = 'bold 10px monospace';
        ctx.shadowColor   = '#000';
        ctx.shadowBlur    = 4;
        ctx.fillText(LABEL_NAMES[kp.name], x + 10, kp.y + 4);
        ctx.shadowBlur    = 0;

        const conf = Math.round(kp.score * 100);
        ctx.fillStyle = color;
        ctx.font      = '9px monospace';
        ctx.fillText(conf + '%', x + 10, kp.y + 15);
      });

      setStatus(`<span>Tracking — ${detected}/17 joints detected</span>`);
    } else {
      setStatus('No person detected — move into frame');
    }

    rafId = requestAnimationFrame(() => loop(video, canvas));
  }

  // Attach event listeners explicitly to avoid ReferenceErrors during execution
  window.addEventListener('load', () => {
    document.getElementById('btnStart').onclick = init;
    document.getElementById('btnToggle').onclick = toggleSkeleton;
    document.getElementById('btnMirror').onclick = toggleMirror;
    
    const slider = document.getElementById('confSlider');
    slider.oninput = function() {
      confVal = parseFloat(this.value);
      document.getElementById('confOut').textContent = this.value;
    };
  });
</script>
</body>
</html>
