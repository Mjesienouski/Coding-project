<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Runner Timing Tracker - Spatial Tracking</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #eee; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 1rem; transition: background 0.3s; overflow-x: hidden; }
    h1 { font-size: 14px; font-weight: 600; color: #888; margin-bottom: 1rem; letter-spacing: 1.5px; text-transform: uppercase; }
    
    .canvas-wrap { 
      position: relative; 
      border-radius: 16px; 
      overflow: hidden; 
      border: 1px solid #333; 
      background: #000; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
      max-width: 100%; 
      touch-action: none;
    }
    #videoEl { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; }
    #poseCanvas { display: block; width: 100%; height: 100%; }
    
    .controls { display: flex; align-items: center; gap: 8px; margin-top: 1rem; flex-wrap: wrap; justify-content: center; max-width: 700px; }
    button { padding: 10px 18px; border: none; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    
    .btn-green { background: #1D9E75; color: #fff; }
    .btn-gray { background: #222; color: #ccc; border: 1px solid #444; }
    .btn-blue { background: #3498db; color: #fff; }
    .btn-red { background: #c0392b; color: #fff; }
    .btn-active { border: 2px solid #1D9E75 !important; background: #2a2a2a; color: #1D9E75; }
    
    button:disabled { opacity: 0.25; cursor: default; }
    
    .slider-wrap { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      font-size: 12px; 
      color: #888; 
      background: #1a1a1a; 
      padding: 8px 14px; 
      border-radius: 20px; 
      border: 1px solid #333; 
    }
    input[type=range] { width: 60px; accent-color: #1D9E75; cursor: pointer; }
    
    .status { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
    .status span { color: #1D9E75; font-weight: 600; }
    
    .timing-panel { margin-top: 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 20px; width: 100%; max-width: 600px; }
    .timing-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #1e1e1e; }
    .t-label { color: #666; font-size: 11px; text-transform: uppercase; }
    .t-value { font-weight: 700; font-size: 18px; font-variant-numeric: tabular-nums; }
    .t-green { color: #1D9E75; }
    .t-blue { color: #4D96FF; }
    
    .hint { font-size: 11px; color: #777; margin-top: 8px; text-align: center; max-width: 400px; }

    @keyframes flash-g { 0% { background: #1D9E7588; } 100% { background: transparent; } }
    .flash-start { animation: flash-g 0.5s ease-out; }
  </style>
</head>
<body>
<h1>Runner Spatial Tracker</h1>

<div class="canvas-wrap" id="canvasWrap">
  <video id="videoEl" autoplay muted playsinline></video>
  <canvas id="poseCanvas"></canvas>
</div>

<div class="controls">
  <button class="btn-green" id="btnStart">Connect Camera</button>
  <button class="btn-gray" id="btnSwitch" disabled>Flip Camera</button>
  <button class="btn-gray" id="btnSetMarkers" disabled>Set Markers</button>
  <button class="btn-red" id="btnReset" disabled>Reset</button>
  
  <div class="slider-wrap">
    Sens.
    <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.3" />
  </div>
</div>

<div class="status" id="statusLine">Camera Required</div>
<div class="hint" id="hintLine">Setting markers pins them to the track. Even if you pan away, the app uses optical flow to remember where they were.</div>

<div class="timing-panel">
  <div class="timing-row">
    <span class="t-label">Status</span>
    <span class="t-value" id="tStatus" style="color:#FFD93D">Waiting</span>
  </div>
  <div class="timing-row">
    <span class="t-label">Split Time</span>
    <span class="t-value t-blue" id="tSplit" style="font-size:24px;">--.---s</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<!-- Using a simple JS Optical Flow implementation for panning support -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsfeat/0.0.8/jsfeat-min.js"></script>

<script>
let detector = null, rafId = null, confVal = 0.3;
let stream = null, currentFacingMode = 'environment';
let settingMarkers = false, markerClickCount = 0;

// Spatial State
let startLineX = null, finishLineX = null;
let startTime = null, finishTime = null;
let startCrossed = false, finishCrossed = false;
let prevChestX = null;

// Optical Flow (Panning Memory)
let curr_img_pyr = new jsfeat.pyramid_t(3);
let prev_img_pyr = new jsfeat.pyramid_t(3);
let point_count = 0;
let point_status = new Uint8Array(100);
let prev_xy = new Float32Array(100*2);
let curr_xy = new Float32Array(100*2);

function setStatus(msg) { document.getElementById('statusLine').innerHTML = msg; }

async function initCamera() {
  const btnStart = document.getElementById('btnStart');
  btnStart.disabled = true;
  setStatus("Initializing...");

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    const video = document.getElementById('videoEl');
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    video.play();

    const canvas = document.getElementById('poseCanvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    updateUI(canvas);

    if (!detector) {
      await tf.ready();
      detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet);
    }

    // Init Optical Flow structures
    curr_img_pyr.allocate(canvas.width, canvas.height, jsfeat.U8_t | jsfeat.C1_t);
    prev_img_pyr.allocate(canvas.width, canvas.height, jsfeat.U8_t | jsfeat.C1_t);

    setStatus("<span>System Ready</span>");
    document.getElementById('btnSetMarkers').disabled = false;
    document.getElementById('btnReset').disabled = false;
    document.getElementById('btnSwitch').disabled = false;
    
    // Use click and touchstart handlers properly
    canvas.onmousedown = handleInteraction;
    canvas.ontouchstart = (e) => {
        e.preventDefault();
        handleInteraction(e);
    };

    if (rafId) cancelAnimationFrame(rafId);
    loop();
  } catch (e) {
    setStatus("Error: " + e.message);
    btnStart.disabled = false;
  }
}

function updateUI(canvas) {
  const wrap = document.getElementById('canvasWrap');
  const ratio = canvas.width / canvas.height;
  const w = Math.min(window.innerWidth - 40, 640);
  wrap.style.width = w + 'px';
  wrap.style.height = (w / ratio) + 'px';
}

function handleInteraction(e) {
  if (!settingMarkers) return;
  
  const canvas = document.getElementById('poseCanvas');
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  
  // Calculate relative X coordinate based on actual canvas dimensions
  const scaleX = canvas.width / rect.width;
  const x = (clientX - rect.left) * scaleX;

  if (markerClickCount === 0) {
    startLineX = x;
    markerClickCount = 1;
    setStatus("Start Set. Tap Finish Line location.");
  } else {
    finishLineX = x;
    markerClickCount = 0;
    settingMarkers = false;
    document.getElementById('btnSetMarkers').classList.remove('btn-active');
    setStatus("<span>Markers Locked</span>");
    seedPoints(canvas.width, canvas.height);
  }
}

function seedPoints(w, h) {
    point_count = 0;
    // Create a grid of points to track the environment
    for(let y=h/4; y<h*0.75; y+=h/6) {
        for(let x=w/4; x<w*0.75; x+=w/6) {
            if(point_count < 100) {
              curr_xy[point_count<<1] = x;
              curr_xy[(point_count<<1)+1] = y;
              point_count++;
            }
        }
    }
}

function trackEnvironment(ctx, w, h) {
    // Only track if markers are actually set
    if (startLineX === null && finishLineX === null) return;

    const imageData = ctx.getImageData(0, 0, w, h);
    
    // Swap pyramids
    let tmp = prev_img_pyr;
    prev_img_pyr = curr_img_pyr;
    curr_img_pyr = tmp;
    
    // Convert current frame to grayscale
    jsfeat.imgproc.grayscale(imageData.data, w, h, curr_img_pyr.data[0]);
    curr_img_pyr.build(curr_img_pyr.data[0]);

    if (point_count > 0) {
        jsfeat.lucas_kanade_optical_flow.track(
            prev_img_pyr, curr_img_pyr, 
            prev_xy, curr_xy, 
            point_count, 20, 30, point_status, 0.01, 0.0001
        );

        let totalShiftX = 0;
        let activePoints = 0;
        for (let i = 0; i < point_count; i++) {
            if (point_status[i] === 1) {
                totalShiftX += (curr_xy[i<<1] - prev_xy[i<<1]);
                activePoints++;
                prev_xy[i<<1] = curr_xy[i<<1];
                prev_xy[(i<<1)+1] = curr_xy[(i<<1)+1];
            }
        }

        if (activePoints > 5) {
            const avgShiftX = totalShiftX / activePoints;
            if (startLineX !== null) startLineX += avgShiftX;
            if (finishLineX !== null) finishLineX += avgShiftX;
        } else {
            seedPoints(w, h);
        }
    }
}

async function loop() {
  const video = document.getElementById('videoEl');
  const canvas = document.getElementById('poseCanvas');
  const ctx = canvas.getContext('2d', {willReadFrequently: true});
  const W = canvas.width, H = canvas.height;

  ctx.drawImage(video, 0, 0, W, H);
  
  // Track panning
  trackEnvironment(ctx, W, H);

  // Throttled Pose Detection (to prevent UI freeze)
  let poses = [];
  if (detector && !settingMarkers) {
    try { 
      poses = await detector.estimatePoses(canvas); 
    } catch(e) {}
  }

  if (poses.length > 0) {
    const kp = poses[0].keypoints;
    const lSh = kp.find(k => k.name === 'left_shoulder');
    const rSh = kp.find(k => k.name === 'right_shoulder');

    if (lSh && rSh && lSh.score > confVal && rSh.score > confVal) {
      const chestX = (lSh.x + rSh.x) / 2;
      
      ctx.beginPath();
      ctx.arc(chestX, (lSh.y + rSh.y)/2, 12, 0, Math.PI*2);
      ctx.fillStyle = "#FFD93D"; ctx.fill();

      const now = performance.now();
      if (prevChestX !== null) {
        if (!startCrossed && startLineX !== null) {
          if ((prevChestX < startLineX && chestX >= startLineX) || (prevChestX > startLineX && chestX <= startLineX)) {
             startCrossed = true; startTime = now;
             document.body.classList.add('flash-start');
             setTimeout(() => document.body.classList.remove('flash-start'), 400);
          }
        }
        if (startCrossed && !finishCrossed && finishLineX !== null) {
          if ((prevChestX < finishLineX && chestX >= finishLineX) || (prevChestX > finishLineX && chestX <= finishLineX)) {
             finishCrossed = true; finishTime = now;
          }
        }
      }
      prevChestX = chestX;
    }
  }

  // Draw Lines
  const drawMarker = (x, color, label) => {
    if (x === null) return;
    ctx.beginPath();
    ctx.setLineDash([10, 5]);
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = color; ctx.font = "bold 24px sans-serif";
    ctx.fillText(label, x + 10, 40);
  };

  drawMarker(startLineX, "#00FF88", "START");
  drawMarker(finishLineX, "#FF4444", "FINISH");

  // UI Updates
  const tSplit = document.getElementById('tSplit');
  const tStatus = document.getElementById('tStatus');
  if (startCrossed && !finishCrossed) {
    tSplit.textContent = ((performance.now() - startTime)/1000).toFixed(3) + "s";
    tStatus.textContent = "RUNNING"; tStatus.style.color = "#00FF88";
  } else if (finishCrossed) {
    tSplit.textContent = ((finishTime - startTime)/1000).toFixed(3) + "s";
    tStatus.textContent = "FINISHED"; tStatus.style.color = "#4D96FF";
  }

  rafId = requestAnimationFrame(loop);
}

document.getElementById('btnStart').onclick = initCamera;
document.getElementById('btnSetMarkers').onclick = () => {
    settingMarkers = true; 
    markerClickCount = 0;
    startLineX = null;
    finishLineX = null;
    document.getElementById('btnSetMarkers').classList.add('btn-active');
    setStatus("Tap START line location on track.");
};
document.getElementById('btnReset').onclick = () => {
    startCrossed = false; finishCrossed = false;
    startTime = null; finishTime = null; prevChestX = null;
    document.getElementById('tSplit').textContent = "--.---s";
    document.getElementById('tStatus').textContent = "Waiting";
    document.getElementById('tStatus').style.color = "#FFD93D";
    setStatus("<span>Ready</span>");
};
document.getElementById('btnSwitch').onclick = async () => {
    currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
    if(stream) stream.getTracks().forEach(t => t.stop());
    initCamera();
};
document.getElementById('confSlider').oninput = (e) => {
  confVal = parseFloat(e.target.value);
};
</script>
</body>
</html>
