<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Runner Timing Tracker - Spatial Memory</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        .header { padding: 15px; text-align: center; }
        h1 { font-size: 18px; margin: 0; color: #3b82f6; letter-spacing: 1px; }

        .video-container {
            position: relative;
            width: 100vw;
            height: 60vh;
            background: #000;
            overflow: hidden;
        }

        video, #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            z-index: 20;
            pointer-events: none;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 90vw;
            max-width: 500px;
            margin-top: 15px;
            z-index: 30;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.96); }

        .btn-blue { background: #3b82f6; color: white; }
        .btn-gray { background: #334155; color: white; }
        .btn-red { background: #ef4444; color: white; }
        .btn-active { outline: 3px solid #10b981; }

        .stats {
            width: 90vw;
            max-width: 500px;
            margin-top: 15px;
            background: #1e293b;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            justify-content: space-around;
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; color: #94a3b8; margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; }

        .marker-label {
            position: absolute;
            top: 20px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 900;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .guide-toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid #3b82f6;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div class="header">
        <h1>SPATIAL RUNNER TRACKER</h1>
    </div>

    <div class="video-container" id="interact-area">
        <video id="webcam" playsinline muted></video>
        <canvas id="output-canvas"></canvas>
        <div id="ui-layer"></div>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-label">STATUS</div>
            <div class="stat-value" id="status-val" style="color: #94a3b8">READY</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">TIME</div>
            <div class="stat-value" id="timer-val">00.000</div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-camera" class="btn-blue">Start Cam</button>
        <button id="btn-markers" class="btn-gray" disabled>Set Markers</button>
        <button id="btn-reset" class="btn-red">Reset</button>
        <button id="btn-flip" class="btn-gray">Flip</button>
    </div>

    <div class="guide-toast" id="guide">Initializing...</div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const uiLayer = document.getElementById('ui-layer');
        
        let detector;
        let isSetting = false;
        let markersCount = 0;
        
        // Spatial State (Stored in Absolute Pixel Units)
        let startX = null;
        let finishX = null;
        let offsetX = 0; // The total camera pan offset in pixels
        
        // Tracking State
        let lastFrameData = null;
        let isRunning = false;
        let isFinished = false;
        let startTime = 0;
        let lastChestX = null;

        async function init() {
            try {
                const model = poseDetection.SupportedModels.MoveNet;
                detector = await poseDetection.createDetector(model);
                document.getElementById('guide').textContent = "Camera Ready";
                document.getElementById('btn-markers').disabled = false;
            } catch(e) {
                console.error(e);
            }
        }

        async function setupCamera(facing = 'environment') {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facing, width: 640, height: 480 },
                audio: false
            });
            video.srcObject = stream;
            return new Promise(r => video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                r();
            });
        }

        // --- THE SPATIAL ENGINE ---
        // This function calculates how much the camera has moved horizontally
        function calculateCameraShift() {
            if (!lastFrameData) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 40; tempCanvas.height = 40;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(video, canvas.width/2 - 20, canvas.height/2 - 20, 40, 40, 0, 0, 40, 40);
                lastFrameData = tempCtx.getImageData(0,0,40,40);
                return 0;
            }

            // Simple block matching at the center of the screen to detect horizontal drift
            // We sample a small 40x40 patch and see how much it moved
            const searchWidth = 100;
            const patchSize = 40;
            const yStart = Math.floor(canvas.height / 2 - patchSize / 2);
            const xStart = Math.floor(canvas.width / 2 - searchWidth / 2);
            
            const currentStrip = ctx.getImageData(xStart, yStart, searchWidth, patchSize);
            
            let bestMatchX = 0;
            let minDiff = Infinity;

            for (let ox = 0; ox < searchWidth - patchSize; ox++) {
                let diff = 0;
                for (let i = 0; i < patchSize * patchSize; i++) {
                    // Compare luminosity (green channel is a good proxy)
                    const p1 = lastFrameData.data[i * 4 + 1];
                    const p2 = currentStrip.data[(ox + (i % patchSize) + Math.floor(i / patchSize) * searchWidth) * 4 + 1];
                    diff += Math.abs(p1 - p2);
                }
                if (diff < minDiff) {
                    minDiff = diff;
                    bestMatchX = ox;
                }
            }

            // Calculate shift relative to the center of the search area
            const shift = bestMatchX - (searchWidth / 2 - patchSize / 2);
            
            // Update reference for next frame
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = patchSize; tempCanvas.height = patchSize;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, canvas.width/2 - patchSize/2, canvas.height/2 - patchSize/2, patchSize, patchSize, 0, 0, patchSize, patchSize);
            lastFrameData = tempCtx.getImageData(0,0,patchSize,patchSize);

            return shift;
        }

        async function loop() {
            ctx.drawImage(video, 0, 0);
            
            // 1. Update Camera Offset (Spatial Memory)
            const shift = calculateCameraShift();
            offsetX += shift;

            // 2. Pose Detection
            const poses = await detector.estimatePoses(video);
            let currentChestX = null;

            if (poses.length > 0) {
                const kp = poses[0].keypoints;
                const lS = kp.find(k => k.name === 'left_shoulder');
                const rS = kp.find(k => k.name === 'right_shoulder');
                
                if (lS.score > 0.3 && rS.score > 0.3) {
                    // chestX relative to the current camera view
                    const screenChestX = (lS.x + rS.x) / 2;
                    // absoluteChestX relative to the world coordinate system
                    currentChestX = screenChestX + offsetX;

                    // Draw tracking marker
                    ctx.fillStyle = "#3b82f6";
                    ctx.beginPath();
                    ctx.arc(screenChestX, (lS.y + rS.y)/2, 8, 0, Math.PI*2);
                    ctx.fill();

                    // Logic: Crossings
                    if (startX !== null && !isRunning && !isFinished) {
                        if (lastChestX && ((lastChestX <= startX && currentChestX > startX) || (lastChestX >= startX && currentChestX < startX))) {
                            startRace();
                        }
                    } else if (finishX !== null && isRunning) {
                        if (lastChestX && ((lastChestX <= finishX && currentChestX > finishX) || (lastChestX >= finishX && currentChestX < finishX))) {
                            stopRace();
                        }
                    }
                    lastChestX = currentChestX;
                }
            }

            // 3. Render Markers (Adjusted by Camera Offset)
            drawWorldLine(startX, "#10b981", "START");
            drawWorldLine(finishX, "#ef4444", "FINISH");

            // 4. Update Timer
            if (isRunning) {
                const now = performance.now();
                document.getElementById('timer-val').textContent = ((now - startTime)/1000).toFixed(3);
            }

            requestAnimationFrame(loop);
        }

        function drawWorldLine(absX, color, label) {
            if (absX === null) return;
            const screenX = absX - offsetX;
            
            // Only draw if it's on screen (or near edges)
            if (screenX > -50 && screenX < canvas.width + 50) {
                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.setLineDash([10, 5]);
                ctx.beginPath();
                ctx.moveTo(screenX, 0);
                ctx.lineTo(screenX, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = color;
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(label, screenX + 8, 30);
            }
        }

        function startRace() {
            isRunning = true;
            startTime = performance.now();
            document.getElementById('status-val').textContent = "RUNNING";
            document.getElementById('status-val').style.color = "#10b981";
            document.getElementById('flash').style.opacity = 0.5;
            setTimeout(() => document.getElementById('flash').style.opacity = 0, 100);
        }

        function stopRace() {
            isRunning = false;
            isFinished = true;
            const final = ((performance.now() - startTime)/1000).toFixed(3);
            document.getElementById('timer-val').textContent = final;
            document.getElementById('status-val').textContent = "FINISHED";
            document.getElementById('status-val').style.color = "#3b82f6";
            document.getElementById('flash').style.opacity = 0.8;
            setTimeout(() => document.getElementById('flash').style.opacity = 0, 200);
        }

        // --- Interaction Handlers ---
        document.getElementById('btn-camera').onclick = async () => {
            await setupCamera();
            video.play();
            init();
            loop();
            document.getElementById('btn-camera').style.display = 'none';
        };

        document.getElementById('btn-markers').onclick = () => {
            isSetting = true;
            markersCount = 0;
            startX = null; finishX = null;
            document.getElementById('btn-markers').classList.add('btn-active');
            document.getElementById('guide').textContent = "TAP START LOCATION";
        };

        document.getElementById('interact-area').onclick = (e) => {
            if (!isSetting) return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const screenX = (e.clientX - rect.left) * scaleX;
            
            // Save as an absolute world coordinate
            const absX = screenX + offsetX;

            if (markersCount === 0) {
                startX = absX;
                markersCount = 1;
                document.getElementById('guide').textContent = "TAP FINISH LOCATION";
            } else {
                finishX = absX;
                isSetting = false;
                document.getElementById('btn-markers').classList.remove('btn-active');
                document.getElementById('guide').textContent = "Ready. Crossing Start line triggers timer.";
            }
        };

        document.getElementById('btn-reset').onclick = () => {
            isRunning = false;
            isFinished = false;
            startX = null; finishX = null;
            document.getElementById('timer-val').textContent = "00.000";
            document.getElementById('status-val').textContent = "READY";
            document.getElementById('status-val').style.color = "#94a3b8";
            document.getElementById('guide').textContent = "Markers cleared.";
        };

        document.getElementById('btn-flip').onclick = () => {
            const mode = video.srcObject.getTracks()[0].getSettings().facingMode === 'user' ? 'environment' : 'user';
            setupCamera(mode);
        };

    </script>
</body>
</html>
