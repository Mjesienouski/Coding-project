<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Penalty Shootout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(#2ecc71, #27ae60);
        text-align: center;
        color: white;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-bottom: 10px;
    }

    .goal {
        width: 1200px;
        height: 700px;
        border: 5px solid white;
        margin: 20px auto;
        position: relative;
        background: rgba(255,255,255,0.1);
    }

    .keeper {
        width: 40px;
        height: 40px;
        background: red;
        border-radius: 50%;
        position: absolute;
        bottom: 10px;
        left: 130px;
        transition: left 0.3s;
    }

    .controls button {
        margin: 5px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
    }

    .left { background: #3498db; }
    .center { background: #f1c40f; color: black; }
    .right { background: #9b59b6; }

    .result {
        margin-top: 15px;
        font-size: 20px;
    }

    .score {
        margin-top: 10px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>⚽ Penalty Shootout</h1>
<p>Choose where to shoot</p>

<div class="goal">
    <div class="keeper" id="keeper"></div>
</div>

<div class="controls">
    <button class="left" onclick="shoot('left')">Left</button>
    <button class="center" onclick="shoot('center')">Center</button>
    <button class="right" onclick="shoot('right')">Right</button>
</div>

<div class="result" id="result"></div>
<div class="score" id="score">Score: 0 / 0</div>

<script>
let goals = 0;
let shots = 0;

function shoot(direction) {
    const keeper = document.getElementById("keeper");
    const choices = ["left", "center", "right"];
    const keeperChoice = choices[Math.floor(Math.random() * 3)];

    shots++;

    // Move keeper
    if (keeperChoice === "left") keeper.style.left = "40px";
    if (keeperChoice === "center") keeper.style.left = "130px";
    if (keeperChoice === "right") keeper.style.left = "220px";

    if (direction === keeperChoice) {
        document.getElementById("result").textContent = "❌ SAVED!";
    } else {
        document.getElementById("result").textContent = "✅ GOAL!";
        goals++;
    }

    document.getElementById("score").textContent =
        `Score: ${goals} / ${shots}`;
}
</script>

</body>
</html>
