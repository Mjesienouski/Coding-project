<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Runner Pro Tracker - MediaPipe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #eee; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1rem; overflow-x: hidden; }
    h1 { font-size: 14px; font-weight: 600; color: #888; margin-bottom: 1rem; letter-spacing: 1.5px; text-transform: uppercase; }
    
    .canvas-wrap { position: relative; border-radius: 16px; overflow: hidden; border: 1px solid #333; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 640px; cursor: crosshair; touch-action: none; }
    #videoEl { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; }
    #poseCanvas { display: block; width: 100%; height: auto; }
    
    .controls { display: flex; align-items: center; gap: 8px; margin-top: 1rem; flex-wrap: wrap; justify-content: center; max-width: 700px; }
    button { padding: 10px 16px; border: none; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; border: 1px solid transparent; }
    .btn-green { background: #1D9E75; color: #fff; }
    .btn-gray { background: #222; color: #ccc; border-color: #444; }
    .btn-blue { background: #4D96FF; color: white; }
    .btn-red { background: #c0392b; color: #fff; }
    .btn-active { border-color: #1D9E75 !important; box-shadow: 0 0 10px rgba(29, 158, 117, 0.3); }
    button:disabled { opacity: 0.2; cursor: default; }

    .setting-group { display: flex; background: #1a1a1a; padding: 4px; border-radius: 12px; border: 1px solid #333; gap: 4px; }
    .setting-btn { padding: 6px 12px; border-radius: 8px; font-size: 10px; background: transparent; color: #666; cursor: pointer; border: none; font-weight: bold; }
    .setting-btn.active { background: #333; color: #fff; }

    .status { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
    .status span { color: #1D9E75; font-weight: 600; }
    
    .timing-panel { margin-top: 12px; background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 12px 20px; width: 100%; max-width: 600px; }
    .timing-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #1e1e1e; }
    .timing-row:last-child { border-bottom: none; }
    .t-label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .t-value { font-weight: 700; font-size: 20px; font-variant-numeric: tabular-nums; }
    .t-green { color: #1D9E75; }
    .t-blue { color: #4D96FF; }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-content { background: #1a1a1a; padding: 24px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 320px; text-align: center; }
    .modal input { width: 100%; padding: 14px; margin: 15px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; text-align: center; font-size: 20px; }
    #flipLabel { font-size: 10px; color: #888; margin-top: 4px; text-align: center; width: 100%; }
  </style>
</head>
<body>

<h1>Runner Pro Tracker</h1>

<div class="canvas-wrap" id="canvasWrap">
  <video id="videoEl" autoplay muted playsinline></video>
  <canvas id="poseCanvas"></canvas>
</div>

<div class="controls">
  <button class="btn-green" id="btnStart">Connect Camera</button>
  <div class="setting-group">
    <button class="setting-btn active" id="modeVert">Vertical</button>
    <button class="setting-btn" id="modeHoriz">Horizontal</button>
  </div>
  <button class="btn-gray" id="btnFlipCamera" disabled>Flip Camera</button>
  <button class="btn-gray" id="btnMirror" disabled>Mirror Off</button>
  <button class="btn-blue" id="btnSetMarkers" disabled>Set Markers</button>
  <button class="btn-red" id="btnReset" disabled>Reset</button>
</div>
<div id="flipLabel"></div>

<div class="status" id="statusLine">Awaiting camera access</div>

<div class="timing-panel">
  <div class="timing-row">
    <span class="t-label">State</span>
    <span class="t-value" id="tStatus" style="color:#FFD93D">Waiting</span>
  </div>
  <div class="timing-row">
    <span class="t-label">Split Time</span>
    <span class="t-value t-blue" id="tSplit">00.000s</span>
  </div>
  <div class="timing-row">
    <span class="t-label">Distance</span>
    <span class="t-value" id="tDist">-- m</span>
  </div>
  <div class="timing-row">
    <span class="t-label">Avg Speed</span>
    <span class="t-value t-green" id="tSpeed">--.-- m/s</span>
  </div>
</div>

<div class="modal" id="distModal">
  <div class="modal-content">
    <h3 style="font-size: 14px; text-transform: uppercase; color: #888;">Enter Track Distance</h3>
    <input type="number" id="distInput" value="10" step="1">
    <div style="font-size: 11px; color: #555; margin-bottom: 20px;">Distance in meters between Start and Finish.</div>
    <button class="btn-green" style="width: 100%; padding: 15px;" id="btnSaveDist">Confirm &amp; Start</button>
  </div>
</div>

<!-- Load MediaPipe Pose and Drawing Utils -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
let pose = null;
let camera = null;
let stream = null;
let isMirrored = false;
let facingMode = 'environment';
let settingMarkers = false;
let markerClickCount = 0;
let markerOrientation = 'vertical';
let lineStartPos = null;
let lineFinishPos = null;
let trackDistance = 10;
let startTime = null;
let finishTime = null;
let isFinished = false;
let isRunning = false;
let prevBodyCoord = null;

const videoEl = document.getElementById('videoEl');
const canvas = document.getElementById('poseCanvas');
const ctx = canvas.getContext('2d');

function setStatus(msg) { document.getElementById('statusLine').innerHTML = msg; }

function updateFlipLabel() {
  document.getElementById('flipLabel').textContent = 'Camera: ' + (facingMode === 'environment' ? 'Rear' : 'Front');
}

function updateUI() {
  const statusEl = document.getElementById('tStatus');
  if (isFinished) { statusEl.textContent = 'DONE'; statusEl.style.color = '#4D96FF'; }
  else if (isRunning) { statusEl.textContent = 'LIVE'; statusEl.style.color = '#1D9E75'; }
  else { statusEl.textContent = lineStartPos !== null ? 'READY' : 'SET LINES'; statusEl.style.color = '#FFD93D'; }
  
  const elapsed = (isRunning && startTime) ? (performance.now() - startTime) : (isFinished ? (finishTime - startTime) : 0);
  document.getElementById('tSplit').textContent = (elapsed / 1000).toFixed(3) + 's';
  document.getElementById('tDist').textContent = trackDistance + ' m';
  
  if (isFinished && elapsed > 0) {
    document.getElementById('tSpeed').textContent = (trackDistance / (elapsed / 1000)).toFixed(2) + ' m/s';
  } else {
    document.getElementById('tSpeed').textContent = '--.-- m/s';
  }
}

async function initMediaPipe() {
  setStatus('Loading MediaPipe Pose Engine...');
  
  pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  pose.onResults(onResults);
  
  await initCamera();
}

async function initCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  
  setStatus('Starting Camera...');
  const constraints = {
    video: { facingMode: { ideal: facingMode }, width: 640, height: 480 }
  };
  
  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    videoEl.srcObject = stream;
    
    videoEl.onloadedmetadata = () => {
      canvas.width = videoEl.videoWidth;
      canvas.height = videoEl.videoHeight;
      startProcessing();
    };
    
    document.getElementById('btnStart').style.display = 'none';
    ['btnMirror', 'btnSetMarkers', 'btnReset', 'btnFlipCamera'].forEach(id => {
      document.getElementById(id).disabled = false;
    });
    updateFlipLabel();
  } catch (err) {
    setStatus('Error: ' + err.message);
  }
}

function startProcessing() {
  const frameLoop = async () => {
    if (videoEl.paused || videoEl.ended) return;
    await pose.send({ image: videoEl });
    requestAnimationFrame(frameLoop);
  };
  frameLoop();
}

function onResults(results) {
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  if (isMirrored) {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

  if (results.poseLandmarks) {
    // 1. Draw the Full Skeleton Connectivity and Joints
    drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS,
                 {color: '#FFFFFF88', lineWidth: 2});
    drawLandmarks(ctx, results.poseLandmarks,
                {color: '#4D96FF', lineWidth: 1, radius: 4});

    // 2. Logic for Timer (Center of Mass)
    const leftHip = results.poseLandmarks[23];
    const rightHip = results.poseLandmarks[24];
    
    if (leftHip.visibility > 0.5 && rightHip.visibility > 0.5) {
      const centerX = ((leftHip.x + rightHip.x) / 2) * canvas.width;
      const centerY = ((leftHip.y + rightHip.y) / 2) * canvas.height;
      
      // Highlight the "Tracking Node" used for timing
      ctx.beginPath();
      ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
      ctx.fillStyle = '#00FF88';
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Trigger Logic
      const currentVal = markerOrientation === 'vertical' ? centerX : centerY;
      
      if (lineStartPos !== null && lineFinishPos !== null && !isFinished) {
        if (prevBodyCoord !== null) {
          const crossedStart = (prevBodyCoord < lineStartPos && currentVal >= lineStartPos) || 
                               (prevBodyCoord > lineStartPos && currentVal <= lineStartPos);
          const crossedFinish = (prevBodyCoord < lineFinishPos && currentVal >= lineFinishPos) || 
                                (prevBodyCoord > lineFinishPos && currentVal <= lineFinishPos);
                                
          if (!isRunning && crossedStart) {
            startTime = performance.now();
            isRunning = true;
          } else if (isRunning && crossedFinish) {
            finishTime = performance.now();
            isRunning = false;
            isFinished = true;
          }
        }
        prevBodyCoord = currentVal;
      }
    }
  }
  ctx.restore();

  // Draw timing markers on top of everything
  if (lineStartPos !== null) drawMarker(lineStartPos, '#00FF88', 'START');
  if (lineFinishPos !== null) drawMarker(lineFinishPos, '#FF4444', 'FINISH');
  
  if (isRunning || isFinished) updateUI();
}

function drawMarker(pos, color, label) {
  ctx.save();
  // If mirrored, the marker position on canvas should match the visual world
  let drawPos = pos;
  if (isMirrored && markerOrientation === 'vertical') {
    drawPos = canvas.width - pos;
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 6;
  ctx.setLineDash([15, 10]);
  ctx.beginPath();
  if (markerOrientation === 'vertical') {
    ctx.moveTo(drawPos, 0); ctx.lineTo(drawPos, canvas.height);
  } else {
    ctx.moveTo(0, pos); ctx.lineTo(canvas.width, pos);
  }
  ctx.stroke();
  
  ctx.fillStyle = color;
  ctx.font = "bold 20px sans-serif";
  if (markerOrientation === 'vertical') ctx.fillText(label, drawPos + 10, 40);
  else ctx.fillText(label, 15, pos - 15);
  ctx.restore();
}

document.getElementById('btnStart').onclick = initMediaPipe;

document.getElementById('btnFlipCamera').onclick = async () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  isMirrored = (facingMode === 'user');
  document.getElementById('btnMirror').textContent = isMirrored ? 'Mirror On' : 'Mirror Off';
  document.getElementById('btnMirror').classList.toggle('btn-active', isMirrored);
  await initCamera();
};

document.getElementById('btnMirror').onclick = function() {
  isMirrored = !isMirrored;
  this.textContent = isMirrored ? 'Mirror On' : 'Mirror Off';
  this.classList.toggle('btn-active', isMirrored);
};

document.getElementById('btnReset').onclick = () => {
  startTime = null; finishTime = null; isRunning = false; isFinished = false;
  prevBodyCoord = null; updateUI();
};

document.getElementById('btnSetMarkers').onclick = () => {
  settingMarkers = true; markerClickCount = 0;
  lineStartPos = null; lineFinishPos = null;
  document.getElementById('btnSetMarkers').classList.add('btn-active');
  setStatus(`Tap to place START line (${markerOrientation})`);
};

function handleMarkerInput(e) {
  if (!settingMarkers) return;
  const rect = canvas.getBoundingClientRect();
  let x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  
  // If mirrored, the click position x needs to be reversed to get "world" coordinates
  if (isMirrored) {
    x = canvas.width - x;
  }

  const val = markerOrientation === 'vertical' ? x : y;

  if (markerClickCount === 0) {
    lineStartPos = val; markerClickCount = 1;
    setStatus("Tap to place FINISH line");
  } else {
    lineFinishPos = val; settingMarkers = false; markerClickCount = 2;
    document.getElementById('btnSetMarkers').classList.remove('btn-active');
    document.getElementById('distModal').style.display = 'flex';
  }
}

canvas.addEventListener('mousedown', handleMarkerInput);
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handleMarkerInput(e.touches[0]);
});

document.getElementById('btnSaveDist').onclick = () => {
  trackDistance = parseFloat(document.getElementById('distInput').value) || 10;
  document.getElementById('distModal').style.display = 'none';
  setStatus("<span>System Ready</span> — Cross Start line to begin");
  updateUI();
};

document.getElementById('modeVert').onclick = function() {
  markerOrientation = 'vertical'; this.classList.add('active');
  document.getElementById('modeHoriz').classList.remove('active');
  lineStartPos = null; lineFinishPos = null;
};
document.getElementById('modeHoriz').onclick = function() {
  markerOrientation = 'horizontal'; this.classList.add('active');
  document.getElementById('modeVert').classList.remove('active');
  lineStartPos = null; lineFinishPos = null;
};
</script>
</body>
</html>
