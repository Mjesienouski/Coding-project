<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Penalty Shootout Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap');

        :root {
            --pitch-green: #2ecc71;
            --pitch-dark: #27ae60;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: white;
            overflow: hidden;
            touch-action: manipulation;
        }

        .pitch {
            background: linear-gradient(to bottom, var(--pitch-green), var(--pitch-dark));
            height: 60vh;
            position: relative;
            border-bottom: 8px solid #ffffff33;
            cursor: crosshair;
        }

        .goal-container {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 650px;
            height: 260px;
            border: 10px solid white;
            border-bottom: none;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.05),
                rgba(255, 255, 255, 0.05) 5px,
                transparent 5px,
                transparent 10px
            );
            box-shadow: 0 0 40px rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .keeper {
            width: 140px; 
            height: 173px;
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            pointer-events: none;
        }

        .arm { transition: transform 0.3s ease-out; }
        .left-arm { transform-origin: 45px 40px; }
        .right-arm { transform-origin: 75px 40px; }

        .ball {
            width: 48px;
            height: 48px;
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
        }

        .ball svg { width: 100%; height: 100%; }

        .controls {
            height: 40vh;
            background: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }

        .keeper-dive-left { 
            left: 20% !important; 
            transform: translateX(-50%) rotate(-65deg) !important; 
        }
        .keeper-dive-left .left-arm { transform: rotate(-70deg); }
        .keeper-dive-left .right-arm { transform: rotate(-30deg); }

        .keeper-dive-right { 
            left: 80% !important; 
            transform: translateX(-50%) rotate(65deg) !important; 
        }
        .keeper-dive-right .right-arm { transform: rotate(70deg); }
        .keeper-dive-right .left-arm { transform: rotate(30deg); }

        .score-card {
            font-family: 'Bungee', cursive;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid #444;
            min-width: 120px;
            text-align: center;
        }

        .message-overlay, .countdown-overlay {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bungee', cursive;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 25px rgba(0,0,0,0.9);
            text-align: center;
            width: 100%;
        }

        .message-overlay {
            font-size: 4rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .countdown-overlay {
            font-size: 8rem;
            color: #fff;
        }

        .active-turn {
            border-color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        #aim-indicator {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px dashed rgba(255,255,255,0.5);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
        }

        .btn-game {
            font-family: 'Bungee', cursive;
            padding: 12px 32px;
            border-radius: 12px;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 rgb(156 163 175);
            cursor: pointer;
        }

        .btn-game:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgb(156 163 175);
        }

        /* The Pause Screen Overlay */
        .paused-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200; /* High z-index to stay on top */
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <div class="pitch" id="pitch">
        <!-- Pause Screen UI -->
        <div id="paused-screen" class="paused-overlay">
            <h1 class="font-['Bungee'] text-5xl mb-8 text-white">GAME PAUSED</h1>
            <button id="resume-btn-overlay" class="btn-game bg-green-500 text-white hover:bg-green-400">Resume</button>
        </div>

        <div id="aim-indicator"></div>
        
        <div class="absolute top-4 left-0 w-full flex justify-around items-center px-4 pointer-events-none">
            <div id="player-card" class="score-card active-turn">
                <div class="text-xs opacity-60">PLAYER</div>
                <div id="player-score" class="text-2xl text-yellow-400">0</div>
            </div>
            <div id="cpu-card" class="score-card">
                <div class="text-xs opacity-60">COMPUTER</div>
                <div id="cpu-score" class="text-2xl text-red-400">0</div>
            </div>
        </div>

        <div id="countdown" class="countdown-overlay">3</div>
        <div id="msg" class="message-overlay">GOAL!</div>

        <div class="goal-container" id="goal-zone">
            <div class="keeper" id="keeper">
                <svg viewBox="0 0 120 180" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="60" cy="20" r="14" fill="#ffdbac"/>
                    <g class="arm left-arm">
                        <path d="M45 40 L25 85" stroke="#ffdbac" stroke-width="12" stroke-linecap="round"/>
                        <circle cx="25" cy="85" r="8" fill="#ffdbac"/>
                    </g>
                    <g class="arm right-arm">
                        <path d="M75 40 L95 85" stroke="#ffdbac" stroke-width="12" stroke-linecap="round"/>
                        <circle cx="95" cy="85" r="8" fill="#ffdbac"/>
                    </g>
                    <path d="M40 35 L80 35 L75 90 L45 90 Z" fill="#e84118"/>
                    <rect x="42" y="90" width="15" height="40" fill="#2f3640"/>
                    <rect x="63" y="90" width="15" height="40" fill="#2f3640"/>
                    <rect x="42" y="130" width="13" height="40" fill="#ffdbac"/>
                    <rect x="65" y="130" width="13" height="40" fill="#ffdbac"/>
                    <rect x="35" y="170" width="22" height="10" rx="4" fill="#000"/>
                    <rect x="63" y="170" width="22" height="10" rx="4" fill="#000"/>
                </svg>
            </div>
        </div>

        <div class="ball" id="ball">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="48" fill="#dc052d" stroke="white" stroke-width="2"/>
                <circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="4"/>
                <clipPath id="circleClip"><circle cx="50" cy="50" r="32" /></clipPath>
                <g clip-path="url(#circleClip)">
                    <rect x="18" y="18" width="64" height="64" fill="white" />
                    <g fill="#0066b2">
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(0,0)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(20,0)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(40,0)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(-10,10)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(10,10)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(30,10)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(50,10)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(0,20)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(20,20)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(40,20)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(-10,30)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(10,30)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(30,30)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(50,30)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(0,40)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(20,40)"/>
                        <path d="M20,20 l10,10 l10,-10 l-10,-10 z" transform="translate(40,40)"/>
                    </g>
                </g>
            </svg>
        </div>
    </div>

    <div class="controls">
        <h2 id="instruction-title" class="text-xl font-bold text-center">GET READY...</h2>
        <p id="instruction-desc" class="text-gray-400 text-sm">Aim with your mouse/touch!</p>
        <div class="flex gap-4">
            <!-- Main Pause Toggle Button -->
            <button id="pause-btn" class="btn-game bg-white text-black hover:bg-gray-200">Pause</button>
        </div>
    </div>

    <script>
        // --- GAME STATE ---
        let playerScore = 0;
        let cpuScore = 0;
        let isAnimating = true; 
        let isPaused = false; // The core state variable
        let turn = 'player'; 
        let mouseX = 0;
        let mouseY = 0;
        let currentCount = 3;
        let countdownTimer = null;

        const ball = document.getElementById('ball');
        const keeper = document.getElementById('keeper');
        const msg = document.getElementById('msg');
        const countdownEl = document.getElementById('countdown');
        const playerScoreVal = document.getElementById('player-score');
        const cpuScoreVal = document.getElementById('cpu-score');
        const goalZone = document.getElementById('goal-zone');
        const title = document.getElementById('instruction-title');
        const desc = document.getElementById('instruction-desc');
        const playerCard = document.getElementById('player-card');
        const cpuCard = document.getElementById('cpu-card');
        const aimIndicator = document.getElementById('aim-indicator');
        const pitch = document.getElementById('pitch');
        
        const pauseBtn = document.getElementById('pause-btn');
        const pausedScreen = document.getElementById('paused-screen');
        const resumeBtnOverlay = document.getElementById('resume-btn-overlay');

        // --- PAUSE LOGIC ---
        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                pausedScreen.style.display = 'flex'; // Show blurred screen
                pauseBtn.innerText = "Resume";
            } else {
                pausedScreen.style.display = 'none'; // Hide blurred screen
                pauseBtn.innerText = "Pause";
            }
        }

        pauseBtn.onclick = togglePause;
        resumeBtnOverlay.onclick = togglePause;

        const updateCoords = (e) => {
            if (isPaused) return; // Don't track mouse while paused
            const rect = pitch.getBoundingClientRect();
            mouseX = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            mouseY = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            aimIndicator.style.left = mouseX + 'px';
            aimIndicator.style.top = mouseY + 'px';
        };

        pitch.addEventListener('mousemove', updateCoords);
        pitch.addEventListener('touchmove', (e) => {
            updateCoords(e);
            e.preventDefault();
        }, {passive: false});

        // --- GAME LOOP ---
        function startAutoCountdown() {
            isAnimating = true;
            currentCount = 3;
            countdownEl.innerText = currentCount;
            countdownEl.style.display = 'block';
            aimIndicator.style.display = 'block';

            if (countdownTimer) clearInterval(countdownTimer);
            
            countdownTimer = setInterval(() => {
                // LEARN THIS: This line effectively "pauses" the countdown loop
                if (isPaused) return; 

                currentCount--;
                if (currentCount > 0) {
                    countdownEl.innerText = currentCount;
                } else {
                    clearInterval(countdownTimer);
                    countdownEl.style.display = 'none';
                    aimIndicator.style.display = 'none';
                    executeTurn();
                }
            }, 1000);
        }

        function executeTurn() {
            if (turn === 'player') playerStrikes(mouseX, mouseY);
            else playerDefends(mouseX);
        }

        function isColliding(rect1, rect2) {
            return !(rect1.right < rect2.left || rect1.left > rect2.right || 
                     rect1.bottom < rect2.top || rect1.top > rect2.bottom);
        }

        function playerStrikes(targetX, targetY) {
            const moves = ['left', 'center', 'right'];
            const keeperMove = moves[Math.floor(Math.random() * 3)];
            if (keeperMove === 'left') keeper.classList.add('keeper-dive-left');
            if (keeperMove === 'right') keeper.classList.add('keeper-dive-right');

            const pitchRect = pitch.getBoundingClientRect();
            const finalX = targetX || pitchRect.width / 2;
            const finalY = targetY || pitchRect.height * 0.2;

            const moveX = finalX - (pitchRect.width / 2);
            const moveY = finalY - (pitchRect.height - 40 - 24);

            ball.style.transform = `translate(${moveX}px, ${moveY}px) scale(0.9) rotate(1080deg)`;
            setTimeout(() => checkResult(true), 500);
        }

        function playerDefends(targetX) {
            const pitchWidth = pitch.clientWidth;
            let dive = 'center';
            if (targetX < pitchWidth * 0.4) dive = 'left';
            else if (targetX > pitchWidth * 0.6) dive = 'right';

            if (dive === 'left') keeper.classList.add('keeper-dive-left');
            if (dive === 'right') keeper.classList.add('keeper-dive-right');

            const cpuTargetX = (Math.random() * 0.6 + 0.2) * pitchWidth;
            const cpuTargetY = (Math.random() * 0.15 + 0.15) * pitch.clientHeight;

            const pitchRect = pitch.getBoundingClientRect();
            const moveX = cpuTargetX - (pitchRect.width / 2);
            const moveY = cpuTargetY - (pitchRect.height - 40 - 24);

            ball.style.transform = `translate(${moveX}px, ${moveY}px) scale(0.9) rotate(1080deg)`;
            setTimeout(() => checkResult(false), 500);
        }

        function checkResult(isPlayerShooting) {
            const ballRect = ball.getBoundingClientRect();
            const keeperRect = keeper.getBoundingClientRect();
            const goalRect = goalZone.getBoundingClientRect();

            const touchedKeeper = isColliding(ballRect, keeperRect);
            const inGoal = ballRect.left >= goalRect.left && ballRect.right <= goalRect.right &&
                           ballRect.top >= goalRect.top && ballRect.bottom <= goalRect.bottom;

            if (touchedKeeper) {
                msg.innerText = "SAVED!";
                msg.style.color = "#e74c3c";
            } else if (inGoal) {
                msg.innerText = "GOAL!";
                msg.style.color = "#2ecc71";
                if (isPlayerShooting) {
                    playerScore++;
                    playerScoreVal.innerText = playerScore;
                } else {
                    cpuScore++;
                    cpuScoreVal.innerText = cpuScore;
                }
            } else {
                msg.innerText = "MISSED!";
                msg.style.color = "#f1c40f";
            }
            msg.style.opacity = "1";
            setTimeout(() => swapTurn(), 1500);
        }

        function swapTurn() {
            turn = turn === 'player' ? 'cpu' : 'player';
            resetField();
            if (turn === 'cpu') {
                title.innerText = "DEFEND!";
                desc.innerText = "Move to where you want to dive!";
                playerCard.classList.remove('active-turn');
                cpuCard.classList.add('active-turn');
            } else {
                title.innerText = "SHOOT!";
                desc.innerText = "Move to aim your shot!";
                cpuCard.classList.remove('active-turn');
                playerCard.classList.add('active-turn');
            }
            startAutoCountdown();
        }

        function resetField() {
            ball.style.transform = "translateX(-50%) scale(1) rotate(0deg)";
            keeper.className = "keeper";
            msg.style.opacity = "0";
            isAnimating = false;
        }

        window.onload = () => {
            startAutoCountdown();
        };
    </script>
</body>
</html>
